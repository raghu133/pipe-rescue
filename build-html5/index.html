<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Pipe Rescue</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #07142a;
      overflow: hidden;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: Arial, Helvetica, sans-serif;
    }
    /* Center the portrait canvas and scale it to fit the viewport while
       preserving the 9:16 aspect ratio. */
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game {
      height: 100vh;
      width: auto;
      max-width: 100vw;
      aspect-ratio: 9 / 16;
      display: block;
      touch-action: none;
    }
    /* Fallback for browsers without aspect-ratio support */
    @supports not (aspect-ratio: 9 / 16) {
      #game { height: 100vh; width: 56.25vh; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
  </div>
  <script src="game.js"></script>
</body>
</html>
